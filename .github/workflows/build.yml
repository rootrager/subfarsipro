name: Build SubFarsiPro Executables

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install System Dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update && sudo apt-get install -y libgl1-mesa-glx python3-tk

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build Executable with PyInstaller (Linux/macOS)
      if: runner.os != 'Windows'
      run: |
        pyinstaller --noconfirm --onedir --windowed --name SubFarsiPro --add-data "assets:assets" main_app.py

    - name: Build Executable with PyInstaller (Windows)
      if: runner.os == 'Windows'
      run: |
        pyinstaller --noconfirm --onedir --windowed --name SubFarsiPro --add-data "assets;assets" main_app.py

    - name: Zip Build Output (Linux/macOS)
      if: runner.os != 'Windows'
      run: |
        cd dist
        zip -r SubFarsiPro-${{ runner.os }}.zip SubFarsiPro/

    - name: Zip Build Output (Windows)
      if: runner.os == 'Windows'
      run: |
        Compress-Archive -Path dist\SubFarsiPro -DestinationPath dist\SubFarsiPro-${{ runner.os }}.zip

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: SubFarsiPro-${{ runner.os }}-executable
        path: dist/SubFarsiPro-${{ runner.os }}.zip
        retention-days: 5

    - name: Upload to GitHub Release
      if: github.event_name == 'release'
      uses: softprops/action-gh-release@v2
      with:
        files: dist/SubFarsiPro-${{ runner.os }}.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
